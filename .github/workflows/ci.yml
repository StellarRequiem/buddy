name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check buddy/ tests/

      - name: Run tests
        run: uv run pytest --tb=short -v
        env:
          # Disable Anthropic API key so no frontier calls are attempted in CI
          ANTHROPIC_API_KEY: ""
          # Use a temp vault so tests don't conflict with each other
          VAULT_PATH: /tmp/buddy-ci-vault

      - name: Coverage report
        if: matrix.python-version == '3.12'
        run: uv run pytest --cov=buddy --cov-report=xml -q
        env:
          ANTHROPIC_API_KEY: ""
          VAULT_PATH: /tmp/buddy-ci-vault

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
